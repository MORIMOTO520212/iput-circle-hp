version: "3.7"

services:
  db:
    image: mysql:8.0
    platform: linux/arm64
    container_name: mysql8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: yWcMY9GcwA972YiXEQCpTqid
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: yWcMY9GcwA972YiXEQCpTqid
    volumes:
      - ../db:/var/lib/mysql

  WordPress:
    image: wordpress:latest
    platform: linux/arm64
    container_name: wordpress
    restart: always
    depends_on:
      - db
    ports:
      - 10090:80
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: yWcMY9GcwA972YiXEQCpTqid
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: 1
    volumes:
      - ../:/var/www/html/wp-content/themes/iput-circle-hp
      - ../db.php:/var/www/html/wp-content/db.php
      - wp_data:/var/www/html

  cli:
    image: wordpress:cli
    platform: linux/arm64
    profiles: ["tools"]   # docker compose up では起動しない（make setup / make seed で on-demand 実行）
    depends_on:
      - db
      - WordPress
    volumes:
      - wp_data:/var/www/html
      - ../:/var/www/html/wp-content/themes/iput-circle-hp
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: yWcMY9GcwA972YiXEQCpTqid
      WORDPRESS_DB_NAME: wordpress

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin_ingrid
    restart: always
    depends_on:
      - db
    ports:
      - 10099:80

volumes:
  wp_data:
