version: "3.7"

services:
  db:
    image: mysql:8.0
    container_name: iputone_mysql8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: yWcMY9GcwA972YiXEQCpTqid
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: yWcMY9GcwA972YiXEQCpTqid
    volumes:
      - ./db:/var/lib/mysql

  WordPress:
    image: wordpress:6.5.0
    container_name: iputone_wordpress
    restart: always
    depends_on:
      - db
    ports:
      - 10090:80
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: yWcMY9GcwA972YiXEQCpTqid
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: 1
    volumes:
      - type: bind
        source: ./plugins
        target: /var/www/html/wp-content/plugins

      - type: bind
        source: ./iput-circle-hp
        target: /var/www/html/wp-content/themes/iput-circle-hp

      - type: bind
        source: ./languages
        target: /var/www/html/wp-content/languages

      - type: bind
        source: ./vendor
        target: /var/www/html/wp-content/themes/iput-circle-hp/vendor

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: iputone_phpmyadmin
    restart: always
    depends_on:
      - db
    ports:
      - 10099:80
