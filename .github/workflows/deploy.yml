name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 153.121.73.181 >> ~/.ssh/known_hosts

      - name: Deploy PHP files (git pull on server)
        run: |
          ssh ubuntu@153.121.73.181 \
            "cd /usr/share/nginx/iput-one.com/wp-content/themes/iput-circle-hp && \
             git checkout -- dist/ && \
             sudo git pull origin main"

      - name: Transfer built assets (rsync)
        run: |
          rsync -avz --delete dist/ \
            ubuntu@153.121.73.181:/usr/share/nginx/iput-one.com/wp-content/themes/iput-circle-hp/dist/
